<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Custom Language IDE</title>
    <link rel="icon" href="favicon.png">
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f5f5f5; }
        .box { width: 100%; height: 180px; font-family: monospace; font-size: 16px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px 0; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        pre { background: #333; color: #fff; padding: 15px; border-radius: 4px; overflow-x: auto; min-height: 50px; }
        h3 { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Antiverbosity オンラインエディタ</h2>
    
    <h3>ソースコード（コードを入力するエリア）</h3>
    <textarea id="sourceCode" class="box" placeholder="M{ I a, b; IN(a, b); O(a + b); }"></textarea>
    
    <h3>標準入力（プログラムに渡すデータ）</h3>
    <textarea id="stdin" class="box" placeholder="5 10"></textarea>
    
    <button onclick="runCode()">実行</button>
    
    <h3>標準出力（プログラムを実行した結果）</h3>
    <pre id="output">ここに結果が表示されます</pre>

    <hr>
<div id="authSection" style="margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px;">
    <h3>ログイン（ブラウザをリロードする度にログアウトされます。）</h3>
    <p style="font-size: 12px; color: #666;">※データはこのパソコンのブラウザ内だけに秘密裏に保存されます。</p>
    <input type="text" id="username" placeholder="ユーザー名" style="padding: 5px;">
    <input type="password" id="password" placeholder="パスワード" style="padding: 5px;">
    <button onclick="localSignUp()" style="background: #28a745; padding: 5px 10px; font-size: 14px;">新規登録</button>
    <button onclick="localSignIn()" style="background: #007bff; padding: 5px 10px; font-size: 14px;">ログイン</button>
</div>

<div id="saveSection" style="display:none; margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px;">
    <p>ようこそ、<span id="userDisplay" style="font-weight: bold;"></span> さん</p>
    <button onclick="localLogout()" style="background: #6c757d; padding: 5px 10px; font-size: 14px;">ログアウト</button>
    <hr>
    <input type="text" id="codeTitle" placeholder="コードのタイトル（例：ABC001_A）" style="width: 250px; padding: 5px;">
    <button onclick="saveCodeLocal()" style="background: #17a2b8;">コードを保存する</button>
    
    <h4>保存したコード一覧</h4>
    <ul id="savedCodesList" style="list-style-type: none; padding-left: 0;"></ul>
</div>
    <script src="script.js"></script>
</body>
</html>
